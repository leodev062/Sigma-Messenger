syntax = "proto3";

package sigmapb;

option go_package = "sigma-server/proto;sigmapb";

message Envelope {
  enum Type {
    TYPE_UNKNOWN = 0;
    CIPHERTEXT = 1;
    PREKEY_BUNDLE = 2;
    RECEIPT = 3;
  }

  Type type = 1;
  string source = 2;
  uint32 source_device = 3;
  uint64 timestamp = 4;
  bytes content = 5;
}
