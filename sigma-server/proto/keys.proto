syntax = "proto3";

package sigmapb;

option go_package = "sigma-server/proto;sigmapb";

message PreKeyRecord {
  int32 id = 1;
  bytes public_key = 2;
}

message PreKeyBundle {
  bytes identity_key = 1;
  uint32 registration_id = 2;
  int32 signed_pre_key_id = 3;
  bytes signed_pre_key_public = 4;
  bytes signed_pre_key_signature = 5;
  repeated PreKeyRecord pre_keys = 6;
}
